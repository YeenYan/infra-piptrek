services:
 # ─── Database ───────────────────────────────────────────────────────────────
 postgres:
  image: postgres:16-alpine
  container_name: piptrek_postgres
  restart: unless-stopped
  environment:
   POSTGRES_DB: piptrek
   POSTGRES_USER: postgres
   POSTGRES_PASSWORD: admin
  volumes:
   - postgres_data:/var/lib/postgresql/data
  ports:
   - "5432:5432"
  healthcheck:
   test: ["CMD-SHELL", "pg_isready -U postgres -d piptrek"]
   interval: 5s
   timeout: 5s
   retries: 10

 # ─── Backend (Laravel) ──────────────────────────────────────────────────────
 be:
  build:
   context: ./pipTrek-be
   dockerfile: ../docker/be/Dockerfile
  container_name: piptrek_be
  restart: unless-stopped
  working_dir: /var/www/html
  volumes:
   - ./pipTrek-be:/var/www/html # hot-reload: live PHP file changes
   - be_vendor:/var/www/html/vendor # persisted vendor dir
  ports:
   - "8000:8000"
  depends_on:
   postgres:
    condition: service_healthy
  environment:
   APP_ENV: local
   APP_DEBUG: "true"
   APP_URL: http://localhost:8000
   DB_CONNECTION: pgsql
   DB_HOST: postgres
   DB_PORT: 5432
   DB_DATABASE: piptrek
   DB_USERNAME: postgres
   DB_PASSWORD: admin
   QUEUE_CONNECTION: database
   CACHE_STORE: database
   SESSION_DRIVER: database
  command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]

 # ─── Queue Worker ────────────────────────────────────────────────────────────
 queue:
  build:
   context: ./pipTrek-be
   dockerfile: ../docker/be/Dockerfile
  container_name: piptrek_queue
  restart: unless-stopped
  working_dir: /var/www/html
  volumes:
   - ./pipTrek-be:/var/www/html
   - be_vendor:/var/www/html/vendor
  depends_on:
   postgres:
    condition: service_healthy
   be:
    condition: service_started
  environment:
   APP_ENV: local
   APP_DEBUG: "true"
   APP_URL: http://localhost:8000
   DB_CONNECTION: pgsql
   DB_HOST: postgres
   DB_PORT: 5432
   DB_DATABASE: piptrek
   DB_USERNAME: postgres
   DB_PASSWORD: admin
   QUEUE_CONNECTION: database
   CACHE_STORE: database
   SESSION_DRIVER: database
  command: ["php", "artisan", "queue:listen", "--tries=1", "--timeout=0"]

 # ─── Frontend (Vue + Vite) ──────────────────────────────────────────────────
 fe:
  build:
   context: ./pipTrek-fe
   dockerfile: ../docker/fe/Dockerfile
  container_name: piptrek_fe
  restart: unless-stopped
  volumes:
   - ./pipTrek-fe:/app # hot-reload: live file changes
   - fe_node_modules:/app/node_modules # persisted node_modules
  ports:
   - "5173:5173"
  depends_on:
   - be
  environment:
   - VITE_API_URL=http://localhost:8000

volumes:
 postgres_data:
 be_vendor:
 fe_node_modules:
